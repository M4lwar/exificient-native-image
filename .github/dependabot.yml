version: 2
updates:
  # Maven dependencies (pom.xml): exificient, slf4j-nop, junit, graalvm-sdk.
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions used in the workflows — keeps the SHA-pinned actions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
