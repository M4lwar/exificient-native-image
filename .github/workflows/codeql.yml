name: codeql

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "23 5 * * 1"   # weekly, Monday 05:23 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: analyze-java
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # required to upload CodeQL results
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # build-mode: none analyzes the Java sources directly — no JDK/Maven build
      # needed (the only buildable surface is the small pure-Java wrapper).
      - uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          languages: java-kotlin
          build-mode: none

      - uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
